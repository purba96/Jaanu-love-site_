<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Jaanu ❤️</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#000;
    color:white;
    text-align:center;
    overflow:hidden;
}

/* slides */
.slide{
    position:absolute;
    width:100%;
    height:100vh;
    top:0;
    left:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    opacity:0;
    pointer-events:none;
    transition:1s ease;
    padding:20px;
}

.active{
    opacity:1;
    pointer-events:auto;
}

/* text */
h1{
    font-size:2.4em;
    text-shadow:0 0 18px rgba(255,255,255,0.5);
}

p{
    font-size:1.3em;
    max-width:420px;
}

/* buttons */
button{
    padding:14px 28px;
    font-size:1.1em;
    margin:12px;
    border:none;
    border-radius:40px;
    background:#ff4d88;
    color:white;
    cursor:pointer;
    box-shadow:0 0 20px rgba(255,77,136,0.7);
    transition:.3s;
}
button:hover{transform:scale(1.1);}

/* hearts */
.heart{
    position:fixed;
    color:#ff4d88;
    animation:float 6s linear infinite;
}
@keyframes float{
    from{transform:translateY(100vh);}
    to{transform:translateY(-10vh);}
}

/* full screen andaman */
#andaman{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    display:none;
    opacity:0;
    transition:1.5s ease;
    z-index:-1;
}

/* final text above image */
#finalMessage{
    position:relative;
    z-index:3;
    font-size:2.8em;
}

/* confetti */
.confetti{
    position:fixed;
    width:8px;
    height:8px;
    background:white;
    top:-10px;
    animation:fall linear forwards;
}
@keyframes fall{
    to{transform:translateY(110vh) rotate(360deg);}
}

</style>
</head>

<body>

<!-- floating hearts -->
<script>
for(let i=0;i<25;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤";
    h.style.left=Math.random()*100+"vw";
    h.style.animationDuration=4+Math.random()*4+"s";
    document.body.appendChild(h);
}
</script>

<!-- music (plays only after YES) -->
<audio id="music" loop>
<source src="YOUR_MUSIC.mp3" type="audio/mp3">
</audio>

<!-- ANDAMAN FULLSCREEN IMAGE -->
<img id="andaman" src="AANDAMAN_1">

<!-- SLIDES -->

<div class="slide active" id="s1">
<h1>Jaanu ❤️</h1>
<p>From the moment you came into my life… everything became brighter.</p>
<button onclick="next(2)">Continue</button>
</div>

<div class="slide" id="s2">
<p>Our story is filled with laughter, memories and dreams…</p>
<button onclick="next(3)">Continue</button>
</div>

<div class="slide" id="s3">
<p>And on <b>12 October</b>… something special awaits us.</p>
<div id="countdown"></div>
<button onclick="next(4)">Tap for Surprise</button>
</div>

<div class="slide" id="s4">
<h1>Are you coming with me?</h1>
<p>A little trip… a little adventure… just us.</p>
<button onclick="yes()">YES ❤️</button>
<button id="noBtn">No 😅</button>
</div>

<div class="slide" id="s5">
<h1 id="finalMessage">Will you travel to Andaman with me? 🌍</h1>
</div>

<script>

/* slide control */
function next(n){
    document.querySelectorAll('.slide').forEach(s=>s.classList.remove('active'));
    document.getElementById('s'+n).classList.add('active');
}

/* countdown */
let target=new Date("Oct 12, 2026").getTime();
setInterval(()=>{
let now=new Date().getTime();
let d=target-now;
let days=Math.floor(d/(1000*60*60*24));
document.getElementById("countdown").innerHTML="⏳ "+days+" days to our day";
},1000);

/* moving NO button */
let no=document.getElementById("noBtn");
no.addEventListener("mouseover",()=>{
    no.style.position="absolute";
    no.style.top=Math.random()*80+"vh";
    no.style.left=Math.random()*80+"vw";
});

/* YES pressed */
function yes(){

    next(5);

    /* show full Andaman */
    let img=document.getElementById("andaman");
    img.style.display="block";
    setTimeout(()=>img.style.opacity=1,200);

    /* play music */
    document.getElementById("music").play();

    /* confetti */
    for(let i=0;i<120;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.animationDuration=3+Math.random()*2+"s";
        c.style.background="hsl("+Math.random()*360+"deg,80%,60%)";
        document.body.appendChild(c);
    }
}

</script>

</body>

</html>
